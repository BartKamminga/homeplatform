<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poulebord — Jeugdcompetitie 2026-2027</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b3427;
    --bg-deep: #082a20;
    --card: #10402f;
    --card-hover: #14503b;
    --tile: #0e3a2a;
    --chalk: #f3efe3;
    --muted: #8fab9d;
    --gold: #cf9f3f;
    --gold-bright: #e8bf68;
    --line: rgba(243,239,227,0.14);
    --red-card: #b5482f;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      repeating-linear-gradient(90deg, transparent, transparent 119px, var(--line) 119px, var(--line) 120px),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
    color:var(--chalk);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding-bottom:80px;
  }
  .wrap{ max-width:1100px; margin:0 auto; padding:32px 20px 0; }

  /* ---- Header ---- */
  header{ text-align:center; margin-bottom:28px; position:relative; }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:0.35em;
    font-size:11px;
    color:var(--gold-bright);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  h1{
    font-family:'Bebas Neue', sans-serif;
    font-size:clamp(40px, 8vw, 76px);
    letter-spacing:0.03em;
    margin:0;
    line-height:0.95;
    color:var(--chalk);
    text-shadow: 0 2px 0 rgba(0,0,0,0.25);
  }
  .sub{
    color:var(--muted);
    font-size:14px;
    margin-top:10px;
    font-weight:500;
  }
  .center-circle{
    width:14px; height:14px; border-radius:50%;
    background:var(--gold);
    margin:18px auto 0;
    box-shadow: 0 0 0 6px rgba(207,159,63,0.15);
  }

  /* ---- Search ---- */
  .search-box{
    position:relative;
    max-width:520px;
    margin:32px auto 8px;
  }
  .search-box input{
    width:100%;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 44px 14px 18px;
    color:var(--chalk);
    font-family:'IBM Plex Mono', monospace;
    font-size:15px;
    outline:none;
    transition:border-color .2s, background .2s;
  }
  .search-box input::placeholder{ color:var(--muted); }
  .search-box input:focus{ border-color:var(--gold); background:var(--card-hover); }
  .search-box svg{
    position:absolute; right:16px; top:50%; transform:translateY(-50%);
    width:16px; height:16px; stroke:var(--muted); pointer-events:none;
  }
  .search-results{
    max-width:520px;
    margin:10px auto 0;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .search-hit{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 14px;
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    align-items:center;
    gap:4px 10px;
    cursor:pointer;
    transition:background .15s, transform .15s;
  }
  .search-hit:hover{ background:var(--card-hover); transform:translateX(2px); }
  .search-hit .name{ font-weight:600; font-size:14px; }
  .search-hit .meta{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--gold-bright);
    letter-spacing:0.04em;
  }
  .search-empty{
    text-align:center; color:var(--muted); font-size:13px; padding:8px; display:none;
  }

  /* ---- Tabs ---- */
  .tabs{
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
    margin:34px 0 14px;
  }
  #genderTabs{ margin:34px 0 10px; }
  #genderTabs .tab-btn{
    font-size:15px;
    padding:6px 20px 5px;
    color:var(--gold-bright);
    border-color:var(--gold-bright);
    background:transparent;
  }
  #genderTabs .tab-btn.active{
    background:var(--gold-bright);
    border-color:var(--gold-bright);
    color:var(--bg-deep);
  }
  #ageTabs{ margin:6px 0 14px; }
  .tab-btn{
    font-family:'Bebas Neue', sans-serif;
    font-size:20px;
    letter-spacing:0.05em;
    background:transparent;
    border:1px solid var(--line);
    color:var(--muted);
    padding:8px 22px 6px;
    border-radius:999px;
    cursor:pointer;
    transition:all .18s;
  }
  .tab-btn:hover{ color:var(--chalk); border-color:var(--gold); }
  .tab-btn.active{
    background:var(--gold);
    border-color:var(--gold);
    color:var(--bg-deep);
  }
  .subtabs{
    display:flex; justify-content:center; gap:6px; margin-bottom:8px;
  }
  .subtab-btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    background:transparent;
    border:none;
    color:var(--muted);
    padding:6px 14px;
    cursor:pointer;
    border-bottom:2px solid transparent;
    transition:all .15s;
  }
  .subtab-btn:hover{ color:var(--chalk); }
  .subtab-btn.active{ color:var(--gold-bright); border-bottom-color:var(--gold-bright); }

  .count-line{
    text-align:center;
    color:var(--muted);
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    margin-bottom:22px;
    letter-spacing:0.05em;
  }

  /* ---- Poule grid ---- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:16px;
  }
  .poule{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
  }
  .poule-head{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 14px;
    border-bottom:1px solid var(--line);
    background:rgba(0,0,0,0.12);
  }
  .poule-letter{
    font-family:'Bebas Neue', sans-serif;
    font-size:22px;
    color:var(--gold-bright);
    background:rgba(207,159,63,0.14);
    width:30px; height:30px;
    border-radius:6px;
    display:flex; align-items:center; justify-content:center;
  }
  .poule-title{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.06em;
    text-transform:uppercase;
  }
  .team-list{ padding:6px 0; }
  .flap-row{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    row-gap:4px;
    gap:10px;
    padding:8px 14px;
    font-family:'IBM Plex Mono', monospace;
    font-size:13.5px;
    color:var(--chalk);
    border-bottom:1px solid rgba(243,239,227,0.06);
    opacity:0;
    transform:perspective(300px) rotateX(-90deg);
    transform-origin:top;
    animation:flapIn .5s ease forwards;
  }
  .flap-row:last-child{ border-bottom:none; }
  .flap-row .num{ color:var(--muted); font-size:11px; width:14px; flex-shrink:0; }
  .flap-row .name{ flex:1 1 auto; min-width:0; overflow-wrap:break-word; }
  .flap-row .badge{ flex-shrink:0; }
  .flap-row.highlight{ background:rgba(207,159,63,0.16); }
  @keyframes flapIn{
    0%{ opacity:0; transform:perspective(300px) rotateX(-90deg); }
    60%{ opacity:1; }
    100%{ opacity:1; transform:perspective(300px) rotateX(0deg); }
  }

  .badge{
    font-family:'Inter', sans-serif;
    font-size:9.5px;
    font-weight:600;
    letter-spacing:0.03em;
    padding:3px 8px;
    border-radius:5px;
    white-space:nowrap;
    text-transform:uppercase;
  }
  .badge-top{ background:rgba(232,191,104,0.18); color:var(--gold-bright); }
  .badge-mid{ background:rgba(78,168,145,0.18); color:#7fcdb4; }
  .badge-stay{ background:rgba(143,171,157,0.12); color:var(--muted); }
  .badge-down{ background:rgba(181,72,47,0.18); color:#e08267; }

  .legend{
    max-width:760px;
    margin:0 auto 26px;
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    justify-content:center;
    font-family:'Inter', sans-serif;
    font-size:12px;
    color:var(--muted);
  }
  .legend span{ display:inline-flex; align-items:center; gap:6px; }
  .legend .dot{ width:9px; height:9px; border-radius:3px; display:inline-block; }
  .legend-note{
    text-align:center;
    max-width:640px;
    margin:0 auto 30px;
    font-size:12.5px;
    color:var(--muted);
    line-height:1.6;
  }

  .view-switch{
    display:flex;
    justify-content:center;
    gap:0;
    margin:36px auto 0;
    max-width:340px;
    border:1px solid var(--line);
    border-radius:999px;
    padding:3px;
  }
  .view-switch button{
    flex:1;
    background:transparent;
    border:none;
    color:var(--muted);
    font-family:'Inter', sans-serif;
    font-size:12.5px;
    font-weight:600;
    padding:8px 12px;
    border-radius:999px;
    cursor:pointer;
    transition:all .18s;
  }
  .view-switch button.active{
    background:var(--gold);
    color:var(--bg-deep);
  }
  .view-switch button:hover:not(.active){ color:var(--chalk); }

  .timeline{
    position:relative;
    max-width:720px;
    margin:30px auto 0;
    padding-left:46px;
  }
  .timeline::before{
    content:'';
    position:absolute;
    left:15px;
    top:6px;
    bottom:6px;
    width:2px;
    background:var(--line);
  }
  .fase-card{
    position:relative;
    margin-bottom:28px;
  }
  .fase-marker{
    position:absolute;
    left:-46px;
    top:0;
    width:32px; height:32px;
    border-radius:50%;
    background:var(--gold);
    color:var(--bg-deep);
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue', sans-serif;
    font-size:17px;
  }
  .fase-box{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 18px;
  }
  .fase-title{
    font-family:'Bebas Neue', sans-serif;
    font-size:22px;
    letter-spacing:0.02em;
    color:var(--chalk);
    margin-bottom:2px;
  }
  .fase-periode{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--gold-bright);
    text-transform:uppercase;
    letter-spacing:0.05em;
    margin-bottom:12px;
  }
  .klasse-row{
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    align-items:center;
    gap:4px 10px;
    padding:8px 0;
    border-top:1px solid rgba(243,239,227,0.08);
    font-size:13.5px;
  }
  .fase-box .klasse-row:first-of-type{ border-top:none; }
  .klasse-naam{ font-weight:600; color:var(--chalk); flex:1 1 auto; min-width:0; }
  .klasse-info{ font-size:11.5px; color:var(--muted); text-align:right; flex-shrink:0; }
  .fase-toelichting{
    font-size:12px;
    color:var(--muted);
    line-height:1.6;
    margin-bottom:14px;
    padding-bottom:14px;
    border-bottom:1px solid rgba(243,239,227,0.08);
  }

  .single-fase-wrap{
    max-width:560px;
    margin:10px auto 0;
  }

  .projection-wrap{
    max-width:1100px;
    margin:34px auto 0;
  }
  .projection-header{
    text-align:center;
    margin-bottom:6px;
  }
  .projection-header h3{
    font-family:'Bebas Neue', sans-serif;
    font-size:26px;
    letter-spacing:0.02em;
    color:var(--gold-bright);
    margin:0;
  }
  .projection-disclaimer{
    max-width:640px;
    margin:8px auto 24px;
    text-align:center;
    font-size:12px;
    color:var(--muted);
    line-height:1.6;
    border:1px dashed var(--line);
    border-radius:10px;
    padding:10px 16px;
  }
  .tier-block{ margin-bottom:32px; }
  .tier-heading{
    display:flex;
    flex-wrap:wrap;
    align-items:baseline;
    gap:6px 10px;
    margin-bottom:12px;
    padding-left:2px;
  }
  .tier-heading .badge{ font-size:10.5px; padding:4px 10px; }
  .tier-heading .tier-note{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--muted);
  }
  .origin-tag{
    display:block;
    font-size:9.5px;
    color:var(--muted);
    margin-top:1px;
  }

  footer{
    text-align:center;
    color:var(--muted);
    font-size:12px;
    margin-top:50px;
    font-family:'IBM Plex Mono', monospace;
  }
  footer .flag{ color:var(--gold-bright); }

  @media (prefers-reduced-motion: reduce){
    .flap-row{ animation:none; opacity:1; transform:none; }
  }

  .seizoen-btn{
    display:inline-block;
    margin-top:20px;
    background:transparent;
    border:1px solid var(--gold-bright);
    color:var(--gold-bright);
    font-family:'Inter', sans-serif;
    font-size:13px;
    font-weight:600;
    padding:9px 20px;
    border-radius:999px;
    cursor:pointer;
    transition:all .18s;
  }
  .seizoen-btn:hover{ background:var(--gold-bright); color:var(--bg-deep); }

  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(5,20,15,0.72);
    backdrop-filter:blur(3px);
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:50px 16px;
    z-index:100;
    overflow-y:auto;
  }
  .modal-box{
    position:relative;
    background:var(--bg-deep);
    border:1px solid var(--line);
    border-radius:16px;
    max-width:760px;
    width:100%;
    padding:32px 28px 36px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-title{
    font-family:'Bebas Neue', sans-serif;
    font-size:40px;
    letter-spacing:0.02em;
    margin:2px 0 18px;
    color:var(--chalk);
    text-align:left;
  }
  .modal-close{
    position:absolute;
    top:18px; right:18px;
    background:transparent;
    border:1px solid var(--line);
    color:var(--muted);
    width:32px; height:32px;
    border-radius:50%;
    cursor:pointer;
    font-size:14px;
    transition:all .15s;
  }
  .modal-close:hover{ color:var(--chalk); border-color:var(--gold-bright); }
  #modalAgeTabs{ justify-content:flex-start; margin:0 0 4px; }

  /* ---- Mobiel ---- */
  @media (max-width: 600px){
    .wrap{ padding:22px 14px 0; }
    header{ margin-bottom:20px; }
    .eyebrow{ letter-spacing:0.22em; font-size:10px; }
    .sub{ font-size:12.5px; padding:0 8px; }
    .seizoen-btn{ width:100%; margin-top:16px; }

    .search-box{ margin:22px auto 8px; max-width:100%; }
    .search-box input{ font-size:14px; padding:12px 40px 12px 14px; }

    .tabs{ gap:6px; margin:22px 0 10px; }
    #genderTabs{ margin:22px 0 8px; }
    .tab-btn{ font-size:16px; padding:6px 14px 5px; }
    #genderTabs .tab-btn{ font-size:13px; padding:5px 14px 4px; }
    .subtab-btn{ font-size:11px; padding:5px 10px; }

    .view-switch{ max-width:100%; }
    .view-switch button{ font-size:11.5px; padding:8px 6px; }

    .grid{ grid-template-columns:1fr; gap:12px; }
    .poule-letter{ width:26px; height:26px; font-size:19px; }
    .flap-row{ padding:9px 12px; font-size:13px; }
    .badge{ font-size:9px; padding:3px 7px; }

    .legend{ gap:8px 12px; font-size:11px; }
    .legend-note{ font-size:11.5px; padding:0 6px; }

    .fase-box{ padding:14px; }
    .fase-title{ font-size:19px; }
    .single-fase-wrap{ max-width:100%; }

    .timeline{ max-width:100%; padding-left:34px; }
    .fase-marker{ left:-34px; width:26px; height:26px; font-size:14px; }

    .projection-header h3{ font-size:21px; }
    .projection-disclaimer{ font-size:11px; padding:9px 12px; }

    .modal-overlay{ padding:18px 10px; }
    .modal-box{ padding:22px 16px 26px; border-radius:12px; }
    .modal-title{ font-size:30px; }
    .modal-close{ top:12px; right:12px; width:28px; height:28px; }

    .search-results{ max-width:100%; }
    .search-hit .name{ font-size:13px; }
    .search-hit .meta{ font-size:10px; }

    footer{ font-size:11px; padding:0 10px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">KNHB Jeugdcompetitie · Seizoen 2026 – 2027</div>
    <h1>POULEBORD</h1>
    <div class="sub">O18 · O16 · O14 — Jongens &amp; Meisjes, Topklasse &amp; Subtopklasse</div>
    <div class="center-circle"></div>
    <button class="seizoen-btn" id="openSeizoen">Bekijk seizoensverloop →</button>
  </header>

  <div class="search-box">
    <input id="search" type="text" placeholder="Zoek een team, bv. Kampong, HDM, Fletiomare…" autocomplete="off">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </div>
  <div class="search-results" id="searchResults"></div>
  <div class="search-empty" id="searchEmpty">Geen team gevonden onder die naam.</div>

  <div id="appContent">
    <div class="view-switch" id="faseSwitch"></div>

    <div class="tabs" id="genderTabs"></div>
    <div class="tabs" id="ageTabs"></div>
    <div class="subtabs" id="levelTabs"></div>
    <div class="count-line" id="countLine"></div>
    <div class="legend" id="legend"></div>
    <div class="legend-note" id="legendNote"></div>
    <div class="grid" id="grid"></div>
    <div class="single-fase-wrap" id="phaseBoxWrap" style="display:none;"></div>
    <div id="projectionSection" style="display:none;"></div>
  </div>

  <footer>Gebaseerd op de definitieve poule-indeling · <span class="flag">wedstrijdprogramma &amp; uitslagen volgen later</span></footer>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none;">
  <div class="modal-box">
    <button class="modal-close" id="modalClose" aria-label="Sluiten">✕</button>
    <div class="eyebrow" style="text-align:left;">Van voorcompetitie tot NK</div>
    <h2 class="modal-title">Seizoensverloop</h2>
    <div class="tabs" id="modalAgeTabs"></div>
    <div class="timeline" id="modalTimeline"></div>
  </div>
</div>

<script>
const DATA = {
Meisjes: {
  MO18: {
    Topklasse: {
      A: ["Craeyenhout MO18-1","Fletiomare MO18-1","Hurley MO18-1","Nijmegen MO18-1"],
      B: ["Gooische MO18-1","HDM MO18-1","Naarden MO18-1","Phoenix MO18-1"],
      C: ["Bloemendaal MO18-1","Groningen MO18-1","Kampong MO18-1","Pinoké MO18-1"],
      D: ["Den Bosch MO18-1","Leonidas MO18-1","Spandersbosch MO18-1","Tilburg MO18-1"],
      E: ["Alliance MO18-1","HGC MO18-1","Oranje-Rood MO18-1","Schiedam MO18-1"],
      F: ["Klein Zwitserland MO18-1","Laren MO18-1","Rood-Wit MO18-1","Victoria MO18-1"],
      G: ["Noordwijk MO18-1","Push MO18-1","Schaerweijde MO18-1","SCHC MO18-1"],
      H: ["Amsterdam MO18-1","Apeldoorn MO18-1","Rotterdam MO18-1","Zwolle MO18-1"]
    },
    Subtopklasse: {
      A: ["Hurley MO18-2","Rosmalen MO18-1","Rotterdam MO18-2","VVV HC MO18-1"],
      B: ["GHBS MO18-1","Hilversum MO18-1","Loenen MO18-1","Union MO18-1"],
      C: ["HUDITO MO18-1","IJburg MO18-1","Qui Vive MO18-1","Voordaan MO18-1"],
      D: ["Almere MO18-1","HDM MO18-2","Shinty MO18-1","Zoetermeer MO18-1"],
      E: ["Cartouche MO18-1","Myra MO18-1","Rijnvliet MO18-1","Ring Pass MO18-1"],
      F: ["Amersfoort MO18-1","EHV MO18-1","HVA (Assen) MO18-1","Maarssen MO18-1"],
      G: ["AthenA MO18-1","Gouda MO18-1","IJsseloever MO18-1","Westland MO18-1"],
      H: ["Bemmel MO18-1","Helmond MO18-1","Weert MO18-1","Were Di MO18-1"],
      I: ["Alphen MO18-1","Barendrecht MO18-1","Bennebroek MO18-1","Kampong MO18-2"],
      J: ["Eemvallei MO18-1","HBS MO18-1","HDS MO18-1","Xenios MO18-1"],
      K: ["Delta Venlo MO18-1","Oranje-Rood MO18-2","Oss MO18-1","SCHC MO18-2"],
      L: ["AMVJ MO18-1","Breda MO18-1","DES MO18-1","Upward MO18-1"],

// ---- Promotie/degradatie-uitkomsten (KNHB Herindelingsregeling Jeugd, meest recent gepubliceerd: 2025-2026) ----
const OUTCOMES = {
  O18: {
    Topklasse:    {1:"Landelijke Competitie", 2:"Landelijke Competitie", 3:"Super O18", 4:"Super O18"},
    Subtopklasse: {1:"Super O18", 2:"Subtopklasse", 3:"Subtopklasse", 4:"1e Klasse"}
  },
  O16: {
    Topklasse:    {1:"Landelijke Competitie", 2:"Landelijke Competitie", 3:"Landelijke Competitie", 4:"Super O16", 5:"Super O16", 6:"Subtopklasse"},
    Subtopklasse: {1:"Super O16", 2:"Subtopklasse", 3:"Subtopklasse", 4:"Subtopklasse", 5:"Subtopklasse", 6:"1e Klasse"}
  },
  O14: {
    Topklasse:    {1:"Super O14", 2:"Super O14", 3:"Super O14", 4:"IDC O14", 5:"IDC O14", 6:"Subtopklasse"}
  }
};

function ageBase(age){ return age.replace(/^(M|J)O/, 'O'); }

function outcomeFor(age, level, position){
  const table = OUTCOMES[ageBase(age)] && OUTCOMES[ageBase(age)][level];
  return table ? table[position] : null;
}

function badgeClass(text){
  if(!text) return 'badge-stay';
  if(text.startsWith('Landelijke') || text === 'Super O14') return 'badge-top';
  if(text.startsWith('Super') || text.startsWith('IDC')) return 'badge-mid';
  if(text === '1e Klasse') return 'badge-down';
  return 'badge-stay';
}

// ---- Illustratieve projectie: hoe fase 2 er (mogelijk) uit kan zien ----
const TIER_POULE_SIZE = {
  O18: {"Landelijke Competitie":8, "Super O18":8, "Subtopklasse":8},
  O16: {"Landelijke Competitie":6, "Super O16":6, "Subtopklasse":6},
  O14: {"Super O14":6, "IDC O14":6}
};
const TIER_ORDER = {
  O18: ["Landelijke Competitie","Super O18","Subtopklasse"],
  O16: ["Landelijke Competitie","Super O16","Subtopklasse"],
  O14: ["Super O14","IDC O14"]
};

function buildProjection(gender, age){
  const base = ageBase(age);
  const levels = DATA[gender][age];
  const buckets = {};
  Object.entries(levels).forEach(([level, poules]) => {
    Object.entries(poules).forEach(([letter, teams]) => {
      teams.forEach((team, idx) => {
        const pos = idx + 1;
        const outcome = outcomeFor(age, level, pos);
        if(outcome && outcome !== '1e Klasse'){
          if(!buckets[outcome]) buckets[outcome] = [];
          buckets[outcome].push({ team, level, letter, pos });
        }
      });
    });
  });
  return buckets;
}

function snakeDistribute(items, numGroups){
  const groups = Array.from({length: numGroups}, () => []);
  let dir = 1, g = 0;
  items.forEach(item => {
    groups[g].push(item);
    if(numGroups > 1){
      if(dir === 1){ if(g === numGroups - 1) dir = -1; else g++; }
      else { if(g === 0) dir = 1; else g--; }
    }
  });
  return groups;
}

function letterFor(i){ return String.fromCharCode(65 + i); }

function renderProjection(){
  const base = ageBase(currentAge);
  const sizes = TIER_POULE_SIZE[base];
  const order = TIER_ORDER[base];
  if(!sizes){ projectionSectionEl.innerHTML = ''; return; }

  const buckets = buildProjection(currentGender, currentAge);

  const tiersHtml = order.filter(t => buckets[t] && buckets[t].length).map(tierName => {
    const items = buckets[tierName];
    const size = sizes[tierName];
    const numGroups = Math.max(1, Math.round(items.length / size));
    const groups = snakeDistribute(items, numGroups);
    const groupsHtml = groups.map((grp, gi) => `
      <div class="poule">
        <div class="poule-head">
          <div class="poule-letter">${letterFor(gi)}</div>
          <div class="poule-title">Poule ${letterFor(gi)}</div>
        </div>
        <div class="team-list">
          ${grp.map((it, i) => `
            <div class="flap-row" style="animation-delay:${i*50}ms">
              <span class="num">${i+1}</span>
              <span class="name">${it.team}<span class="origin-tag">uit ${it.level} ${it.letter} · nr. ${it.pos}</span></span>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
    return `
      <div class="tier-block">
        <div class="tier-heading">
          <span class="badge ${badgeClass(tierName)}">${tierName}</span>
          <span class="tier-note">${groups.length} poule${groups.length > 1 ? 's' : ''} × ~${size} · ${items.length} teams uit fase 1</span>
        </div>
        <div class="grid">${groupsHtml}</div>
      </div>
    `;
  }).join('');

  projectionSectionEl.innerHTML = `
    <div class="projection-wrap">
      <div class="projection-header"><h3>Mogelijke indeling na Fase 1</h3></div>
      <div class="projection-disclaimer">Illustratief — gebaseerd op de aanname dat de huidige volgorde in elke poule ook de eindstand wordt. De KNHB deelt na de voorcompetitie opnieuw in op basis van <strong>rating</strong>, niet alleen op eindpositie, dus de echte indeling kan (en zal) afwijken. Ook ontbreken hier de instromers vanuit de 1e Klasse.</div>
      ${tiersHtml}
    </div>
  `;
}

let modalAge = 'O18';

function renderModalAgeTabs(){
  modalAgeTabsEl.innerHTML = '';
  Object.keys(PHASES).forEach(age => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (age === modalAge ? ' active' : '');
    btn.textContent = age;
    btn.onclick = () => { modalAge = age; renderModalTimeline(); renderModalAgeTabs(); };
    modalAgeTabsEl.appendChild(btn);
  });
}

function renderModalTimeline(){
  const fases = PHASES[modalAge];
  modalTimelineEl.innerHTML = fases.map((f, i) => `
    <div class="fase-card">
      <div class="fase-marker">${i+1}</div>
      <div class="fase-box">
        <div class="fase-title">${f.naam}</div>
        <div class="fase-periode">${f.periode}</div>
        ${f.toelichting ? `<div class="fase-toelichting">${f.toelichting}</div>` : ''}
        ${f.klassen.map(k => `
          <div class="klasse-row">
            <span class="klasse-naam"><span class="badge ${k.cls}" style="margin-right:8px;">&nbsp;</span>${k.naam}</span>
            <span class="klasse-info">${k.info}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function openModal(){
  renderModalAgeTabs();
  renderModalTimeline();
  modalOverlayEl.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeModal(){
  modalOverlayEl.style.display = 'none';
  document.body.style.overflow = '';
}
openSeizoenBtn.addEventListener('click', openModal);
modalCloseBtn.addEventListener('click', closeModal);
modalOverlayEl.addEventListener('click', (e) => { if(e.target === modalOverlayEl) closeModal(); });
document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });

function renderFaseSwitch(){
  faseSwitchEl.innerHTML = '';
  [[1,'Fase 1'],[2,'Fase 2'],[3,'Fase 3']].forEach(([num,label]) => {
    const btn = document.createElement('button');
    btn.className = currentFase === num ? 'active' : '';
    btn.textContent = label;
    btn.onclick = () => { currentFase = num; renderAll(); };
    faseSwitchEl.appendChild(btn);
  });
}

function renderPhaseBox(){
  const base = ageBase(currentAge);
  const fase = PHASES[base][currentFase - 1];
  phaseBoxWrapEl.innerHTML = `
    <div class="fase-box">
      <div class="fase-title">${fase.naam}</div>
      <div class="fase-periode">${fase.periode}</div>
      ${fase.toelichting ? `<div class="fase-toelichting">${fase.toelichting}</div>` : ''}
      ${fase.klassen.map(k => `
        <div class="klasse-row">
          <span class="klasse-naam"><span class="badge ${k.cls}" style="margin-right:8px;">&nbsp;</span>${k.naam}</span>
          <span class="klasse-info">${k.info}</span>
        </div>
      `).join('')}
    </div>
  `;
}

function updateVisibility(){
  const isFase1 = currentFase === 1;
  const isFase2 = currentFase === 2;
  levelTabsEl.style.display = isFase1 ? '' : 'none';
  countLineEl.style.display = isFase1 ? '' : 'none';
  legendEl.style.display = isFase1 ? '' : 'none';
  gridEl.style.display = isFase1 ? '' : 'none';
  phaseBoxWrapEl.style.display = isFase1 ? 'none' : '';
  projectionSectionEl.style.display = isFase2 ? '' : 'none';
  legendNoteEl.textContent = isFase1
    ? "Op basis van de KNHB-herindelingsregeling: na de voorcompetitie bepaalt de eindpositie in de poule (o.b.v. rating) naar welk vervolgniveau een team doorstroomt. Bron: KNHB, meest recent gepubliceerde regeling (2025-2026) — de versie voor 2026-2027 verschijnt later dit seizoen."
    : "De poule-indeling van deze fase wordt pas na afloop van de voorgaande fase samengesteld op basis van rating en resultaten. Hieronder staat alvast de structuur — zodra de KNHB de daadwerkelijke indeling publiceert, vul ik die hier aan.";
}

function renderAll(){
  renderFaseSwitch();
  renderGenderTabs();
  renderAgeTabs();
  renderLevelTabs();
  renderLegend();
  updateVisibility();
  if(currentFase === 1){
    renderGrid();
  } else {
    renderPhaseBox();
    if(currentFase === 2) renderProjection();
  }
}

// ---- Search across everything ----
function buildIndex(){
  const idx = [];
  Object.entries(DATA).forEach(([gender, ages]) => {
    Object.entries(ages).forEach(([age, levels]) => {
      Object.entries(levels).forEach(([level, poules]) => {
        Object.entries(poules).forEach(([letter, teams]) => {
          teams.forEach(team => {
            idx.push({ team, gender, age, level, letter });
          });
        });
      });
    });
  });
  return idx;
}
const INDEX = buildIndex();

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  searchResultsEl.innerHTML = '';
  searchEmptyEl.style.display = 'none';
  if(q.length === 0){
    appContentEl.style.display = '';
    return;
  }
  appContentEl.style.display = 'none';
  const hits = INDEX.filter(h => h.team.toLowerCase().includes(q));
  if(hits.length === 0){
    searchEmptyEl.style.display = 'block';
    return;
  }
  hits.slice(0, 30).forEach(h => {
    const row = document.createElement('div');
    row.className = 'search-hit';
    row.innerHTML = `<span class="name">${h.team}</span><span class="meta">${h.gender} · ${h.age.replace(/^(M|J)O/, 'O')} · ${h.level} · Poule ${h.letter}</span>`;
    row.onclick = () => {
      searchInput.value = '';
      searchResultsEl.innerHTML = '';
      appContentEl.style.display = '';
      currentFase = 1;
      currentGender = h.gender;
      currentAge = h.age;
      currentLevel = h.level;
      renderAll();
      setTimeout(() => {
        document.querySelectorAll('.poule-title').forEach(pt => {
          if(pt.textContent === `Poule ${h.letter}`){
            const card = pt.closest('.poule');
            card.scrollIntoView({behavior:'smooth', block:'center'});
            card.style.transition = 'box-shadow .3s';
            card.style.boxShadow = '0 0 0 2px #cf9f3f';
            setTimeout(()=> card.style.boxShadow = '', 1400);
          }
        });
      }, 60);
    };
    searchResultsEl.appendChild(row);
  });
});

renderAll();
</script>
