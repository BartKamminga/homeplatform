<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="hdr">
  <span class="emoji">🏑</span>
  <h1>Hockey Data Vanger v2.4</h1>
</div>
<div class="bar">
  <span id="status"></span>
  <span id="info"></span>
</div>
<div class="tab-bar">
  <button class="tab-btn active" id="tabData" data-tab="data">📊 Data</button>
  <button class="tab-btn" id="tabCapture" data-tab="capture">📡 Capture</button>
  <button class="tab-btn" id="tabSettings" data-tab="settings">⚙️ Instellingen</button>
  <button class="tab-btn" id="tabLog" data-tab="log">📝 Log</button>
</div>
<div class="cnt" id="cnt"></div>
<div class="cnt hidden" id="settingsPane"></div>
<div class="cnt hidden" id="logPane"></div>
<div class="cnt hidden" id="capturePane"></div>
<div class="acts">
  <button class="bs" id="bRefresh">🔄 Vernieuwen</button>
  <button class="bs" id="bClear">🗑️ Wissen</button>
</div>
<div class="dbg" id="dbg"></div>
<div class="toast" id="toast"></div>
<script src="popup.js"></script>
</body>
</html>
