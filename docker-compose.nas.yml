# docker-compose.nas.yml
# NAS-specifieke configuratie voor Synology
# Gebruik: sudo docker-compose -f docker-compose.nas.yml up --build -d

services:
  caddy:
    image: caddy:latest
    container_name: homeplatform_caddy
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./Caddyfile.nas:/etc/caddy/Caddyfile
      - ./frontend/dist:/srv/www
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homeplatform_backend
    volumes:
      - /volume1/homeplatform/db:/app/db
      - /volume1/homeplatform/uploads:/app/uploads
      - /volume1/homeplatform/nas-files:/app/nas-files
      - /volume1/Music/music/Mixes:/app/music:ro
      - /volume1/Music/downloads:/app/downloads
      - /volume1/homeplatform/beatportdl-config:/app/beatportdl-config
    environment:
      - DATABASE_URL=sqlite:///./db/homeplatform.sqlite
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
      - MUSIC_DIR=/app/music
      - DOWNLOAD_DIR=/app/downloads
      - BEATPORTDL_CONFIG_DIR=/app/beatportdl-config
      - SENTRY_DSN=${SENTRY_DSN:-}
      - NAS_URL=${NAS_URL:-}
      - EXTERNAL_URL=${EXTERNAL_URL:-}
    restart: unless-stopped

  gitea:
    image: gitea/gitea:latest
    container_name: homeplatform_gitea
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - /volume1/homeplatform/gitea-data:/data
    environment:
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea.db
    restart: unless-stopped

  glitchtip-db:
    image: postgres:16
    container_name: homeplatform_glitchtip_db
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: glitchtip
    volumes:
      - /volume1/homeplatform/glitchtip-db:/var/lib/postgresql/data
    restart: unless-stopped

  glitchtip-redis:
    image: redis:7-alpine
    container_name: homeplatform_glitchtip_redis
    restart: unless-stopped

  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: homeplatform_glitchtip
    ports:
      - "8090:8080"
    environment:
      DATABASE_URL: postgresql://glitchtip:glitchtip@glitchtip-db/glitchtip
      CELERY_BROKER_URL: redis://glitchtip-redis:6379/0
      VALKEY_URL: redis://glitchtip-redis:6379/0
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      PORT: 8080
      GLITCHTIP_DOMAIN: http://192.168.30.193:8090
      EMAIL_URL: consolemail://
    volumes:
      - /volume1/homeplatform/glitchtip-uploads:/code/uploads
    depends_on:
      - glitchtip-db
      - glitchtip-redis
    restart: unless-stopped

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    container_name: homeplatform_glitchtip_worker
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgresql://glitchtip:glitchtip@glitchtip-db/glitchtip
      CELERY_BROKER_URL: redis://glitchtip-redis:6379/0
      VALKEY_URL: redis://glitchtip-redis:6379/0
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
    depends_on:
      - glitchtip-db
      - glitchtip-redis
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: homeplatform_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --loglevel debug run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - caddy

volumes:
  caddy_data:
  caddy_config:
