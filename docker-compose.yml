services:
  caddy:
    image: caddy:latest
    container_name: homeplatform_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./frontend/dist:/srv/www
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homeplatform_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/db:/app/db
      - ./nas-files:/app/nas-files
    environment:
      - DATABASE_URL=sqlite:///./db/homeplatform.sqlite
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
    restart: unless-stopped
    
  gitea:
    image: gitea/gitea:latest
    container_name: homeplatform_gitea
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - ./gitea-data:/data
    environment:
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea.db
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config: